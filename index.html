  if(!audioCtx) return;

  const now = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(volume, now);

    0.0001,
    now + duration

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.stop(now + duration);
}

    const arrangements = getMusicArrangement();

    if(step >= nextPhraseStep){

        let index;

                Math.random() *
                arrangements.length

        Math.floor(

  if(section === "A"){

  else if(section === "B"){
    return {bass:bassPatternB, lead:leadPatternB};
  }
  else if(section === "C"){
    return {bass:bassPatternC, lead:leadPatternC};
  }

  return {bass:bassPatternD, lead:leadPatternD};
}

function musicScheduler(){

  if(!audioCtx || !musicStarted) return;

  const BPM = 148;
  const STEP = (60 / BPM) / 2;
  const scheduleAheadTime = 0.12;

  while(nextNoteTime < audioCtx.currentTime + scheduleAheadTime){

    scheduleMusicStep(
      musicStep,
      nextNoteTime,
      STEP
    );

    musicStep++;
    nextNoteTime += STEP;
  }
}

    musicStep = 0;
    nextNoteTime = audioCtx.currentTime + 0.035;

      0.012,

function endRun(){

        bestDistance = distance;

            "sourceLaneBestDistance",
            String(bestDistance)

            "sourceLaneBestScore",
            String(bestScore)
        );
    }

    const bestSources =
        Number(localStorage.getItem("sourceLaneBestSources") || 0);
